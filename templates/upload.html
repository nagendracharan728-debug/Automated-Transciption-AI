{% extends "base.html" %}

{% block content %}

<!-- Sound wave animation bars (futuristic neon) -->
<div class="sound-bars" style="display:flex; justify-content:center; gap:6px; margin-top:60px;">
    <span style="width:6px; height:40px; background:#6366f1; animation:wave 1s infinite ease-in-out;"></span>
    <span style="width:6px; height:40px; background:#06b6d4; animation:wave 1s infinite ease-in-out 0.1s;"></span>
    <span style="width:6px; height:40px; background:#6366f1; animation:wave 1s infinite ease-in-out 0.2s;"></span>
    <span style="width:6px; height:40px; background:#06b6d4; animation:wave 1s infinite ease-in-out 0.3s;"></span>
    <span style="width:6px; height:40px; background:#6366f1; animation:wave 1s infinite ease-in-out 0.4s;"></span>
</div>

<style>
@keyframes wave{
  0%{height:20px;}
  50%{height:80px;}
  100%{height:20px;}
}
</style>

<!-- Upload Card -->
<div class="container" style="margin-top:80px; text-align:center;">

    <h1 class="title" style="font-size:50px; background:linear-gradient(90deg,#6366f1,#06b6d4); -webkit-background-clip:text; color:transparent; text-shadow: 0 0 15px #06b6d4, 0 0 30px #6366f1;">
        AI Podcast Analyzer
    </h1>
    <p class="subtitle" style="color:#cbd5f5; margin-top:10px; font-size:18px;">
        Upload your podcast and visualize the sound
    </p>

    <div class="upload-card" style="background:rgba(0,0,0,0.5); backdrop-filter:blur(20px); padding:40px; border-radius:20px; margin:40px auto; width:500px; box-shadow:0 0 20px #6366f1, 0 0 40px #06b6d4; transition:0.3s;">
        <form action="/process" method="POST" enctype="multipart/form-data">

            <label class="drop-zone" style="display:block; padding:40px; border:2px dashed #06b6d4; border-radius:15px; cursor:pointer; color:white; font-weight:bold; margin-bottom:20px; text-shadow:0 0 5px #06b6d4;">
                <input type="file" name="podcast" id="fileInput" hidden>
                <p>🎧 Drag & Drop Podcast</p>
                <span style="font-size:14px; color:#cbd5f5;">or click to upload</span>
            </label>

            <div id="waveform" style="margin-bottom:25px;"></div>

            <button class="analyze-btn" type="submit" style="padding:15px 35px; font-size:16px; font-weight:bold; border:none; border-radius:12px; background:#6366f1; color:white; cursor:pointer; box-shadow:0 0 15px #6366f4, 0 0 25px #06b6d4; transition:0.3s;">
                Analyze Podcast
            </button>

        </form>
    </div>

</div>

<script src="{{ url_for('static', filename='js/upload.js') }}"></script>

{% endblock %}
